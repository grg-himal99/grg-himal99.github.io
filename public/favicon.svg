<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background like a terminal -->
  <rect width="64" height="64" rx="12" fill="#0d1117"/>
  <!-- Green top accent bar -->
  <rect x="0" y="0" width="64" height="4" rx="2" fill="#4CAF50"/>
  <!-- Three dots like a code editor window -->
  <circle cx="10" cy="13" r="3" fill="#ff5f57"/>
  <circle cx="21" cy="13" r="3" fill="#febc2e"/>
  <circle cx="32" cy="13" r="3" fill="#28c840"/>
  <!-- < HG /> -->
  <text x="50%" y="65%" dominant-baseline="middle" text-anchor="middle"
    font-family="monospace" font-weight="900" font-size="14" letter-spacing="0.5">
    <tspan fill="#4CAF50">&lt; </tspan><tspan fill="white">HG</tspan><tspan fill="#4CAF50"> /&gt;</tspan>
  </text>
</svg>
